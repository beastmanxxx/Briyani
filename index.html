<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bikkgane Biryani — Authentic Hyderabadi Biryani</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<style>
  :root{
    --maroon-deep:#2b0c0a;
    --maroon:#4a120c;
    --ember:#a8290f;
    --saffron:#f0a824;
    --saffron-bright:#ffc23c;
    --cream:#fbf3e3;
    --cream-soft:#f6ead2;
    --ink:#241208;
    --smoke:#7a6a55;
    --shadow-deep: 0 30px 60px -25px rgba(20,5,2,0.55);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:'Manrope', sans-serif;
    overflow-x:hidden;
  }
  ::selection{ background:var(--saffron-bright); color:var(--maroon-deep); }

  h1,h2,h3, .display{
    font-family:'Fraunces', serif;
    margin:0;
  }
  .eyebrow{
    font-family:'Bebas Neue', sans-serif;
    letter-spacing:.35em;
    font-size:13px;
    color:var(--ember);
    text-transform:uppercase;
  }

  /* Scrollbar flourish */
  ::-webkit-scrollbar{ width:10px; }
  ::-webkit-scrollbar-track{ background:var(--cream-soft); }
  ::-webkit-scrollbar-thumb{ background:var(--ember); border-radius:10px; }

  /* ---------- NAV ---------- */
  .nav{
    position:fixed; top:0; left:0; right:0; z-index:999;
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 6vw;
    background:rgba(43,12,10,0.0);
    transition:.4s ease;
  }
  .nav.scrolled{
    background:rgba(28,8,6,0.92);
    backdrop-filter:blur(10px);
    padding:12px 6vw;
    box-shadow:0 8px 30px rgba(0,0,0,.25);
  }
  .brand{ display:flex; align-items:center; gap:12px; }
  .brand-mark{
    width:42px;height:42px; border-radius:10px;
    background:linear-gradient(145deg,var(--saffron-bright),var(--saffron));
    display:flex;align-items:center;justify-content:center;
    font-family:'Bebas Neue';font-size:22px;color:var(--maroon-deep);
    box-shadow:0 6px 16px rgba(240,168,36,.45);
    transform:rotate(-3deg);
  }
  .brand-name{ color:var(--cream); font-family:'Fraunces'; font-weight:700; font-size:19px; letter-spacing:.5px; line-height:1.05;}
  .brand-name span{ display:block; font-size:11px; font-family:'Bebas Neue'; letter-spacing:.3em; color:var(--saffron-bright);}
  .nav-links{ display:flex; gap:38px; list-style:none; }
  .nav-links li{
    color:var(--cream); opacity:.85; font-size:14px; font-weight:600; letter-spacing:.02em; cursor:pointer;
    position:relative; padding-bottom:4px; transition:.25s;
  }
  .nav-links li::after{
    content:''; position:absolute; left:0; bottom:0; height:2px; width:0%;
    background:var(--saffron-bright); transition:.3s ease;
  }
  .nav-links li:hover{ opacity:1; }
  .nav-links li:hover::after{ width:100%; }
  .login-btn{
    border:1px solid rgba(251,243,227,.35); color:var(--cream); background:transparent;
    padding:9px 22px; border-radius:30px; font-weight:700; font-size:13px; letter-spacing:.04em;
    cursor:pointer; transition:.3s;
  }
  .login-btn:hover{ background:var(--saffron-bright); color:var(--maroon-deep); border-color:var(--saffron-bright); transform:translateY(-2px); }
  .burger{ display:none; flex-direction:column; gap:5px; cursor:pointer; }
  .burger span{ width:26px; height:2px; background:var(--cream); }
  .mobile-links{
    position:absolute; top:100%; left:0; right:0; list-style:none; margin:0; padding:18px 6vw;
    background:rgba(28,8,6,0.97); backdrop-filter:blur(10px);
    display:flex; flex-direction:column; gap:18px;
  }
  .mobile-links li{ color:var(--cream); font-weight:700; font-size:15px; cursor:pointer; }

  /* ---------- HERO ---------- */
  .hero{
    position:relative; min-height:auto; display:flex; align-items:center;
    background:
      radial-gradient(circle at 20% 20%, rgba(168,41,15,.55), transparent 55%),
      radial-gradient(circle at 80% 80%, rgba(74,18,12,.7), transparent 55%),
      linear-gradient(160deg, var(--maroon-deep), var(--maroon) 60%, #1d0705);
    overflow:hidden;
    padding:120px 6vw 60px;
  }
  .hero::before{
    content:''; position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(45deg, rgba(255,194,60,.035) 0 2px, transparent 2px 26px);
    pointer-events:none;
  }
  .steam{
    position:absolute; border-radius:50%; filter:blur(40px);
    background:radial-gradient(circle, rgba(255,194,60,.35), transparent 70%);
    animation:float 9s ease-in-out infinite;
  }
  .steam.s1{ width:340px; height:340px; top:8%; left:6%; animation-delay:0s;}
  .steam.s2{ width:260px; height:260px; bottom:5%; right:8%; animation-delay:2.4s;}
  @keyframes float{
    0%,100%{ transform:translateY(0) scale(1); }
    50%{ transform:translateY(-26px) scale(1.06); }
  }

  .hero-grid{
    position:relative; z-index:2; width:100%;
    display:grid; grid-template-columns:1.05fr 0.95fr; gap:40px; align-items:center;
  }
  .hero-copy .eyebrow{ color:var(--saffron-bright); opacity:0; animation:riseIn .8s .15s forwards; }
  .hero-title{
    font-size:clamp(46px, 6.6vw, 92px);
    color:var(--cream);
    line-height:0.92;
    font-weight:900;
    margin:14px 0 6px;
    opacity:0; animation:riseIn .9s .3s forwards;
  }
  .hero-title em{
    font-style:normal; color:transparent;
    background:linear-gradient(90deg,var(--saffron-bright), #ffe9a8 50%, var(--saffron-bright));
    background-clip:text; -webkit-background-clip:text;
    background-size:200% auto;
    animation:shine 3.5s linear infinite;
  }
  @keyframes shine{ to{ background-position:-200% center; } }
  .hero-sub{
    color:#f1ddc4; max-width:480px; font-size:16px; line-height:1.7; margin:18px 0 30px;
    opacity:0; animation:riseIn .9s .45s forwards;
  }
  .promo-pill{
    display:inline-flex; align-items:center; gap:14px;
    background:rgba(251,243,227,.08); border:1px solid rgba(255,194,60,.4);
    padding:10px 10px 10px 18px; border-radius:60px; margin-bottom:30px;
    opacity:0; animation:riseIn .9s .55s forwards;
  }
  .promo-pill .tag{ font-family:'Bebas Neue'; letter-spacing:.12em; color:var(--saffron-bright); font-size:14px;}
  .promo-pill code{
    background:var(--saffron-bright); color:var(--maroon-deep); padding:7px 16px; border-radius:40px;
    font-family:'Bebas Neue'; letter-spacing:.08em; font-size:14px;
  }
  .hero-ctas{ display:flex; gap:16px; opacity:0; animation:riseIn .9s .65s forwards; }
  .btn-primary{
    background:linear-gradient(135deg,var(--saffron-bright),var(--saffron));
    border:none; color:var(--maroon-deep); font-weight:800; font-size:14px;
    padding:16px 30px; border-radius:50px; cursor:pointer; letter-spacing:.02em;
    box-shadow:0 14px 30px -10px rgba(240,168,36,.6);
    transition:.3s;
  }
  .btn-primary:hover{ transform:translateY(-3px); box-shadow:0 20px 36px -10px rgba(240,168,36,.75); }
  .btn-ghost{
    background:transparent; border:1px solid rgba(251,243,227,.4); color:var(--cream);
    font-weight:700; font-size:14px; padding:16px 26px; border-radius:50px; cursor:pointer; transition:.3s;
  }
  .btn-ghost:hover{ background:rgba(251,243,227,.1); }

  @keyframes riseIn{ from{ opacity:0; transform:translateY(22px);} to{ opacity:1; transform:translateY(0);} }

  .hero-dish{
    position:relative; display:flex; align-items:center; justify-content:center;
    opacity:0; animation:popIn 1.1s .35s forwards;
  }
  @keyframes popIn{ from{opacity:0; transform:scale(.85) rotate(-4deg);} to{opacity:1; transform:scale(1) rotate(0);} }
  .dish-ring{
    position:absolute; width:480px; height:480px; border-radius:50%;
    border:1px dashed rgba(255,194,60,.35);
    animation:spin 40s linear infinite;
  }
  .dish-ring.r2{ width:420px; height:420px; border-color:rgba(255,194,60,.18); animation-duration:55s; animation-direction:reverse; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .dish-photo{
    width:420px; height:420px; border-radius:50%; object-fit:cover;
    box-shadow:0 40px 70px -20px rgba(0,0,0,.65), 0 0 0 10px rgba(251,243,227,.06);
    animation:bob 5s ease-in-out infinite;
    position:relative; z-index:2;
  }
  @keyframes bob{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-16px);} }
  .price-badge{
    position:absolute; bottom:14px; left:6px; background:var(--cream);
    border-radius:18px; padding:12px 18px; box-shadow:var(--shadow-deep);
    display:flex; align-items:center; gap:10px; z-index:3;
    animation:bob 5s ease-in-out infinite .3s;
  }
  .price-badge .num{ font-family:'Bebas Neue'; font-size:26px; color:var(--ember); }
  .price-badge .lab{ font-size:11px; color:var(--smoke); font-weight:700; }

  .scroll-cue{
    position:absolute; bottom:30px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:8px; color:rgba(251,243,227,.6);
    font-size:11px; letter-spacing:.25em; z-index:2;
  }
  .scroll-cue .stick{ width:1px; height:36px; background:linear-gradient(var(--saffron-bright), transparent); animation:cue 1.6s ease-in-out infinite; }
  @keyframes cue{ 0%{ transform:scaleY(0); transform-origin:top;} 50%{transform:scaleY(1); transform-origin:top;} 51%{transform-origin:bottom;} 100%{transform:scaleY(0); transform-origin:bottom;} }

  /* ---------- REVEAL ---------- */
  .reveal{ opacity:0; transform:translateY(40px); transition:opacity .8s ease, transform .8s ease; }
  .reveal.in{ opacity:1; transform:translateY(0); }
  .stagger > * { transition-delay:calc(var(--i) * 90ms); }

  /* ---------- SECTION HEADER ---------- */
  .section{ padding:60px 6vw; position:relative; }
  .section-head{ text-align:center; margin-bottom:34px; }
  .section-head h2{
    font-size:clamp(30px,4vw,46px); font-weight:700; color:var(--maroon-deep);
    display:inline-flex; align-items:center; gap:18px;
  }
  .section-head h2::before, .section-head h2::after{
    content:''; width:48px; height:1px; background:var(--ember); opacity:.5;
  }
  .section-head p{ margin-top:10px; color:var(--smoke); font-size:14px; letter-spacing:.05em; text-transform:uppercase; }

  /* ---------- CHEF RECOMMENDED ---------- */
  .cat-grid{
    display:grid; grid-template-columns:repeat(4, 1fr); gap:26px;
  }
  .cat-card{
    background:#fff; border-radius:20px; overflow:hidden; cursor:pointer;
    box-shadow:0 14px 34px -22px rgba(43,12,10,.35);
    transition:transform .4s cubic-bezier(.2,.9,.3,1.3), box-shadow .4s;
    position:relative;
    border:6px solid #ffffff;
    outline:1px solid rgba(43,12,10,.08);
  }
  .cat-card:hover{ transform:translateY(-10px) rotate(-0.5deg); box-shadow:0 26px 50px -20px rgba(43,12,10,.4); }
  .cat-img-wrap{ position:relative; height:180px; overflow:hidden; }
  .cat-img-wrap img{ width:100%; height:100%; object-fit:cover; transition:transform .6s; }
  .cat-card:hover .cat-img-wrap img{ transform:scale(1.12); }
  .cat-img-wrap::after{
    content:''; position:absolute; inset:0;
    background:linear-gradient(180deg, transparent 60%, rgba(43,12,10,.55));
  }
  .cat-name{ padding:16px 18px; font-weight:700; color:var(--ink); font-size:15px; text-align:center; }

  .view-all-wrap{ text-align:center; margin-top:30px; }

  /* ---------- ABOUT ---------- */
  .about{
    background:linear-gradient(180deg, var(--cream-soft), var(--cream));
  }
  .about-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:70px; align-items:center;
  }
  .about-grid h2{ font-size:clamp(28px,3.6vw,42px); color:var(--maroon-deep); margin-bottom:18px; font-weight:700;}
  .about-grid .underline{ width:60px; height:3px; background:var(--saffron); border-radius:4px; margin-bottom:24px; }
  .about-grid p{ color:#5c4632; line-height:1.9; font-size:15.5px; font-style:italic; }
  .about-img{
    position:relative; border-radius:24px; overflow:hidden; box-shadow:var(--shadow-deep);
  }
  .about-img img{ width:100%; display:block; height:440px; object-fit:cover; transition:transform 1s; }
  .about-img:hover img{ transform:scale(1.06); }

  /* ---------- PROMO STRIP ---------- */
  .promo-strip{
    background:var(--cream-soft);
  }
  .strip-viewport{
    overflow:hidden; width:100%;
  }
  .strip-track{
    display:flex; gap:24px; padding-bottom:10px; width:max-content;
    transition: transform 1s cubic-bezier(.65,.05,.36,1);
    will-change:transform;
  }
  .strip-card{
    flex:0 0 360px; height:200px; border-radius:18px;
    position:relative; overflow:hidden; box-shadow:0 18px 34px -18px rgba(43,12,10,.4);
    background-size:cover; background-position:center;
    display:flex; align-items:flex-end; padding:20px; color:#fff;
  }
  .strip-card .overlay{
    position:absolute; inset:0; background:linear-gradient(160deg, rgba(74,18,12,.85), rgba(43,12,10,.35));
  }
  .strip-card .content{ position:relative; z-index:2; }
  .strip-card .content .small{ font-family:'Bebas Neue'; letter-spacing:.15em; font-size:12px; color:var(--saffron-bright);}
  .strip-card .content h4{ font-family:'Fraunces'; font-size:20px; margin:4px 0; }
  .strip-dots{ display:flex; gap:8px; justify-content:center; margin-top:24px; }
  .strip-dots span{ width:7px;height:7px;border-radius:50%; background:rgba(74,18,12,.25); }
  .strip-dots span.active{ background:var(--ember); width:22px; border-radius:6px; transition:.3s;}

  /* ---------- CHECKOUT PRODUCTS ---------- */
  .prod-track{
    display:flex; gap:24px; overflow-x:auto; scroll-snap-type:x mandatory; padding-bottom:14px; scrollbar-width:none;
  }
  .prod-track::-webkit-scrollbar{ display:none; }
  .prod-card{
    flex:0 0 270px; background:#fff; border-radius:20px; scroll-snap-align:start;
    box-shadow:0 14px 30px -20px rgba(43,12,10,.4); overflow:hidden;
    transition:transform .4s;
    border:6px solid #ffffff;
    outline:1px solid rgba(43,12,10,.08);
  }
  .prod-card:hover{ transform:translateY(-8px); }
  .prod-img{ height:170px; overflow:hidden; position:relative; }
  .prod-img img{ width:100%; height:100%; object-fit:cover; transition:transform .5s; }
  .prod-card:hover .prod-img img{ transform:scale(1.1); }
  .veg-dot{ position:absolute; top:12px; left:12px; width:18px; height:18px; border:2px solid #2e7d32; border-radius:3px; background:#fff; display:flex; align-items:center; justify-content:center; }
  .veg-dot::after{ content:''; width:8px;height:8px;border-radius:50%; background:#2e7d32; }
  .veg-dot.nonveg{ border-color:#c62828; }
  .veg-dot.nonveg::after{ background:#c62828; }
  .prod-info{ padding:16px 18px 20px; }
  .prod-info h4{ font-size:14.5px; font-weight:700; color:var(--ink); line-height:1.4; min-height:40px; }
  .prod-foot{ display:flex; align-items:center; justify-content:space-between; margin-top:14px; }
  .prod-foot .price{ font-family:'Bebas Neue'; font-size:20px; color:var(--ember); letter-spacing:.03em; }
  .view-btn{
    background:var(--saffron-bright); border:none; padding:8px 18px; border-radius:30px; font-weight:800;
    font-size:12.5px; color:var(--maroon-deep); cursor:pointer; transition:.3s;
  }
  .view-btn:hover{ background:var(--ember); color:#fff; transform:scale(1.05); }

  .checkout-head-row{
    display:flex; align-items:center; justify-content:space-between; margin-bottom:30px; flex-wrap:wrap; gap:16px;
  }
  .checkout-head-row .section-head{ margin-bottom:0; text-align:left; flex:1; min-width:220px; }
  .scroll-row-arrows{ display:flex; gap:10px; }
  .arrow-btn{
    width:42px; height:42px; border-radius:50%; border:1px solid rgba(74,18,12,.2); background:#fff;
    cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--maroon); font-size:18px;
    transition:.25s; flex-shrink:0;
  }
  .arrow-btn:hover{ background:var(--ember); color:#fff; border-color:var(--ember); }
  .arrow-btn:disabled{ opacity:.35; cursor:not-allowed; }
  @media (max-width:600px){
    .checkout-head-row{ flex-direction:column; align-items:flex-start; }
    .checkout-head-row .section-head{ text-align:center; width:100%; }
    .scroll-row-arrows{ align-self:center; }
  }

  /* ---------------- ABOUT PAGE / GALLERY PAGE ---------------- */
  .page-banner{
    width:100%; height:38vh; min-height:260px; overflow:hidden; position:relative; margin-top:0;
  }
  .page-banner img{ width:100%; height:100%; object-fit:cover; display:block; }
  .page-banner::after{
    content:''; position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(43,12,10,.25), rgba(43,12,10,.05) 40%, rgba(43,12,10,.55));
  }

  .story-section{
    background:var(--cream-soft); padding:50px 6vw; text-align:center;
  }
  .story-section .section-head{ margin-bottom:34px; }
  .story-section p{
    max-width:1100px; margin:0 auto; color:#5c4632; line-height:2.05; font-size:15.5px;
  }

  .gallery-grid{
    display:grid; grid-template-columns:repeat(3, 1fr); gap:26px;
  }
  .gallery-grid .g-item{
    border-radius:18px; overflow:hidden; box-shadow:0 18px 36px -20px rgba(43,12,10,.4);
    position:relative; height:300px;
  }
  .gallery-grid .g-item img{ width:100%; height:100%; object-fit:cover; transition:transform .6s; }
  .gallery-grid .g-item:hover img{ transform:scale(1.1); }

  @media (max-width:900px){
    .gallery-grid{ grid-template-columns:repeat(2,1fr); }
  }
  @media (max-width:600px){
    .gallery-grid{ grid-template-columns:1fr; }
    .page-banner{ height:40vh; }
  }

  /* ---------- CTA BAND ---------- */
  .cta-band{
    margin:0 6vw 0; border-radius:28px;
    background:linear-gradient(120deg, var(--maroon-deep), var(--ember));
    padding:36px 6vw; display:flex; align-items:center; justify-content:space-between; gap:30px;
    position:relative; overflow:hidden;
  }
  .cta-band::before{
    content:'%'; position:absolute; right:-30px; top:-50px; font-family:'Bebas Neue'; font-size:280px; color:rgba(255,194,60,.08);
  }
  .cta-band h3{ color:var(--cream); font-size:clamp(22px,3vw,32px); max-width:520px; position:relative; z-index:2;}
  .cta-band .btn-primary{ position:relative; z-index:2; }

  /* ---------- FOOTER ---------- */
  footer{ background:linear-gradient(135deg, var(--saffron-bright), var(--saffron)); padding:40px 6vw 0; margin-top:50px; }
  .foot-grid{ display:grid; grid-template-columns:1.2fr 1fr 1.3fr 1fr; gap:40px; padding-bottom:50px; }
  .foot-grid h5{ font-family:'Bebas Neue'; letter-spacing:.1em; font-size:15px; color:var(--maroon-deep); margin-bottom:16px;}
  .foot-grid a, .foot-grid p{ display:block; color:#4a2c0c; text-decoration:none; font-size:13.5px; margin-bottom:10px; opacity:.85; }
  .foot-grid a:hover{ opacity:1; text-decoration:underline; }
  .pay-icons{ display:flex; gap:8px; flex-wrap:wrap; }
  .pay-icons span{ background:#fff; padding:6px 10px; border-radius:6px; font-size:11px; font-weight:800; color:var(--maroon); }
  .social-icons{ display:flex; gap:12px; margin-top:14px; }
  .social-icons a{
    width:36px;height:36px;border-radius:50%; background:rgba(43,12,10,.12);
    display:flex; align-items:center; justify-content:center; font-size:14px; color:var(--maroon-deep);
    transition:.3s;
  }
  .social-icons a:hover{ background:var(--maroon-deep); color:var(--saffron-bright); transform:translateY(-3px); }
  .stores-line{
    border-top:1px solid rgba(43,12,10,.18); padding:20px 0; font-size:12.5px; color:#5c3c12; line-height:2;
  }
  .stores-line b{ color:var(--maroon-deep); }
  .copyright{
    text-align:center; padding:18px 0; background:#fff; font-size:12.5px; color:var(--smoke);
  }

  .back-top{
    position:fixed; bottom:28px; right:28px; z-index:500;
    width:48px;height:48px;border-radius:50%; background:var(--maroon-deep); color:var(--saffron-bright);
    border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px;
    box-shadow:0 12px 26px -10px rgba(0,0,0,.5); opacity:0; pointer-events:none; transition:.35s;
  }
  .back-top.show{ opacity:1; pointer-events:auto; }
  .back-top:hover{ background:var(--ember); }

  @media (max-width:980px){
    .hero-grid{ grid-template-columns:1fr; text-align:center; }
    .hero-copy{ order:2; } .hero-dish{ order:1; }
    .hero-sub{ margin-left:auto; margin-right:auto; }
    .promo-pill, .hero-ctas{ justify-content:center; }

/* ---------------- Reveal on scroll hook ---------------- */
function Reveal({children, className="", style}){
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(()=>{
    const obs = new IntersectionObserver(([e])=>{
      if(e.isIntersecting){ setVis(true); obs.disconnect(); }
    }, {threshold:.15});
    if(ref.current) obs.observe(ref.current);
    return ()=>obs.disconnect();
  },[]);
  return <div ref={ref} className={`reveal ${vis?'in':''} ${className}`} style={style}>{children}</div>;
}

];
function PromoStrip(){
  const CARD_W = 360, GAP = 24, STEP = CARD_W + GAP;
  const slides = [...promos, ...promos, ...promos]; // clones for seamless loop
  const [index, setIndex] = useState(promos.length); // start in the middle copy
  const [animate, setAnimate] = useState(true);
  const trackRef = useRef(null);
  const pausedRef = useRef(false);

  useEffect(()=>{
    const timer = setInterval(()=>{
      if(!pausedRef.current) setIndex(i => i + 1);
    }, 3000);
    return ()=> clearInterval(timer);
  },[]);

  // seamless jump back when reaching end of cloned set
  useEffect(()=>{
    if(index >= promos.length * 2){
      const t = setTimeout(()=>{
        setAnimate(false);
        setIndex(promos.length);
      }, 1000);
      return ()=>clearTimeout(t);
    } else if(!animate){
      requestAnimationFrame(()=> requestAnimationFrame(()=> setAnimate(true)));
    }
  },[index]);

  const activeDot = index % promos.length;

  return (
    <section className="section promo-strip"
      onMouseEnter={()=> pausedRef.current = true}
      onMouseLeave={()=> pausedRef.current = false}>
      <Reveal><div className="section-head"><h2>Authentic Biryani</h2></div></Reveal>
      <Reveal>
        <div className="strip-viewport">
          <div
            className="strip-track"
            ref={trackRef}
            style={{
              transform:`translateX(-${index * STEP}px)`,
              transition: animate ? 'transform 1s cubic-bezier(.65,.05,.36,1)' : 'none'
            }}
          >
            {slides.map((p,i)=>(
              <div className="strip-card" key={i} style={{backgroundImage:`url(${p.img})`}}>
                <div className="overlay"></div>
                <div className="content">
                  <div className="small">{p.small}</div>
                  <h4>{p.title}</h4>
                </div>
              </div>
            ))}
          </div>
        </div>
      </Reveal>
      <div className="strip-dots">
        {promos.map((_,i)=> <span key={i} className={i===activeDot?'active':''}></span>)}
      </div>
    </section>
  );
}

function App(){

        setPage('home');

    setPage(key);
    window.scrollTo({top:0, behavior:'smooth'});
  };

  useEffect(()=>{
    const handler = (e)=> goTo(e.detail);
    document.addEventListener('navigate', handler);
    return ()=> document.removeEventListener('navigate', handler);
  },[page]);

  return (
