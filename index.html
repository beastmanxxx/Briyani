    /* ─── CHECKOUT PAGE ─── */
    function CheckoutPage({ cart, user, onBack, onSuccess }) {
      const [paymentMethod, setPaymentMethod] = useState('cod');
      const [address, setAddress] = useState('');
      const [lat, setLat] = useState(null);
      const [lng, setLng] = useState(null);
      const [gettingLoc, setGettingLoc] = useState(false);
      const [placing, setPlacing] = useState(false);
      const total = cart.reduce((s, p) => s + (p.salePrice || p.price), 0);

      const getLocation = () => {
        if (!navigator.geolocation) { alert('Geolocation is not supported by your browser.'); return; }
        setGettingLoc(true);
        navigator.geolocation.getCurrentPosition(async (pos) => {
          const { latitude, longitude } = pos.coords;
          setLat(latitude); setLng(longitude);
          try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
            const data = await res.json();
            setAddress(data.display_name || `${latitude}, ${longitude}`);
          } catch (e) {
            setAddress(`${latitude.toFixed(5)}, ${longitude.toFixed(5)}`);
          }
          setGettingLoc(false);
        }, () => { alert('Unable to get location. Please allow location access.'); setGettingLoc(false); });
      };

      const placeOrder = async () => {
        if (!address.trim()) { alert('Please enter or fetch your delivery address.'); return; }
        setPlacing(true);
        try {
          // Group items for storage
          const itemMap = {};
          cart.forEach(p => {
            const k = p.id || p.name;
            if (itemMap[k]) itemMap[k].qty++;
            else itemMap[k] = { name: p.name, price: p.salePrice || p.price, qty: 1, img: p.imgs ? p.imgs[0] : (p.image || '') };
          });
          const items = Object.values(itemMap);
          // Fetch user's phone from Firestore (set at signup)
          let userPhone = 'N/A';
          try {
            const userDoc = await fbDb.collection('users').doc(user.uid).get();
            if (userDoc.exists && userDoc.data().phone) userPhone = userDoc.data().phone;
          } catch (e) { }
          await fbDb.collection('orders').add({
            userId: user.uid,
            userName: user.displayName || user.email || 'User',
            userPhone,
            items,
            total,
            paymentMethod,
            address,
            lat: lat || 0,
            lng: lng || 0,
            status: 'pending',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          onSuccess();
        } catch (err) {
          alert('Error placing order: ' + err.message);
        }
        setPlacing(false);
      };

      const mapSrc = lat && lng
        ? `https://www.openstreetmap.org/export/embed.html?bbox=${lng - 0.01},${lat - 0.01},${lng + 0.01},${lat + 0.01}&layer=mapnik&marker=${lat},${lng}`
        : `https://www.openstreetmap.org/export/embed.html?bbox=72.8,18.9,72.95,19.1&layer=mapnik`;

      return (
        <div className="checkout-page">
          <div className="checkout-container">
            <div className="cart-page-header">
              <button className="cart-back-btn" onClick={onBack}>‹</button>
              <h2>📍 Checkout</h2>
            </div>

            <div className="checkout-section">
              <h3>📍 Delivery Location</h3>
              <div className="checkout-map-wrap">
                <iframe src={mapSrc} title="map" />
                <div className="checkout-map-overlay"><span className="map-pin">📍</span></div>
              </div>
              <button className="checkout-get-location-btn" onClick={getLocation} disabled={gettingLoc}>
                <span>📡</span> {gettingLoc ? 'Getting Location...' : 'Use My Current Location'}
              </button>
              <textarea
                className="checkout-address-input"
                placeholder="Your delivery address will appear here, or type manually..."
                value={address}
                onChange={e => setAddress(e.target.value)}
              />
            </div>

            <div className="checkout-section">
              <h3>💳 Payment Method</h3>
              <div className="payment-options">
                <div className={`payment-option ${paymentMethod === 'online' ? 'selected' : ''}`} onClick={() => setPaymentMethod('online')}>
                  <div className="payment-option-icon">💳</div>
                  <div className="payment-option-label">Pay Online</div>
                  <div className="payment-option-sub">UPI / Card / Net Banking</div>
                </div>
                <div className={`payment-option ${paymentMethod === 'cod' ? 'selected' : ''}`} onClick={() => setPaymentMethod('cod')}>
                  <div className="payment-option-icon">💵</div>
                  <div className="payment-option-label">Cash on Delivery</div>
                  <div className="payment-option-sub">Pay when delivered</div>
                </div>
              </div>
            </div>

            <div className="checkout-section">
              <h3>🧾 Order Summary</h3>
              {cart.reduce((acc, p) => {
                const k = p.id || p.name; const ex = acc.find(a => a.k === k);
                if (ex) ex.qty++; else acc.push({ k, name: p.name, price: p.salePrice || p.price, qty: 1 });
                return acc;
              }, []).map((item, i) => (
                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 14, padding: '4px 0', color: '#444' }}>
                  <span>{item.name} × {item.qty}</span>
                  <span style={{ fontWeight: 700 }}>₹{item.price * item.qty}</span>

              ))}
              <div style={{ borderTop: '1px solid #f0f0f0', marginTop: 12, paddingTop: 12, display: 'flex', justifyContent: 'space-between', fontWeight: 800, fontSize: 16 }}>
                <span>Total</span><span>₹{total}</span>
              </div>
            </div>

            <button className="checkout-place-btn" onClick={placeOrder} disabled={placing || !address.trim()}>
              {placing ? '⏳ Placing Order...' : '✅ Place Order'}
            </button>
          </div>
        </div>
      );

    /* ─── USER ORDERS PAGE ─── */
    function UserOrdersPage({ user, onBack }) {
      const [orders, setOrders] = useState([]);
      const [loading, setLoading] = useState(true);
      useEffect(() => {
        if (!user) return;
        const unsub = fbDb.collection('orders').where('userId', '==', user.uid).onSnapshot(async snap => {
          const now = Date.now();
          const batch = fbDb.batch();
          const items = [];
          snap.forEach(doc => {
            const d = doc.data();
            const createdMs = d.createdAt ? d.createdAt.toMillis() : 0;
            const ageHrs = (now - createdMs) / 3600000;
            if (ageHrs > 24 && (d.status === 'completed' || d.status === 'rejected')) {
              batch.delete(doc.ref);
            } else {
              items.push({ id: doc.id, ...d });
            }
          });
          // Sort by createdAt descending client-side
          items.sort((a, b) => {
            const at = a.createdAt ? a.createdAt.toMillis() : 0;
            const bt = b.createdAt ? b.createdAt.toMillis() : 0;
            return bt - at;
          });
          await batch.commit();
          setOrders(items);
          setLoading(false);
        });
        return unsub;
      }, [user]);

      const statusLabel = { pending: '⏳ Pending', shipped: '🚚 Shipped', completed: '✅ Delivered', rejected: '❌ Rejected' };

      return (
        <div className="orders-page">

    /* ─── Cloudinary Image Upload ─── */
    const uploadImage = (btn) => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const origText = btn?.textContent;
        if (btn) btn.textContent = '⏳ Uploading...';
        try {
          const formData = new FormData();
          formData.append('file', file);
          formData.append('upload_preset', CLOUDINARY_CONFIG.uploadPreset);
          formData.append('folder', CLOUDINARY_CONFIG.uploadFolder);
          const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CONFIG.cloudName}/image/upload`, {
            method: 'POST',
            body: formData
          });
          const data = await res.json();
          if (data.secure_url) {
            if (btn) btn.textContent = '✅ Uploaded!';
            setTimeout(() => { if (btn) btn.textContent = '📤 Upload'; }, 2000);
            // Store URL in the active readonly input
            const readonlyInputs = btn?.closest('.admin-card')?.querySelectorAll('input[readonly]') || [];
            readonlyInputs.forEach(inp => { inp.value = data.secure_url; });
            // Show preview inside the parent card
            const preview = btn?.closest('.admin-card')?.querySelector('[id$=Preview]');
            if (preview) { preview.style.display = 'block'; preview.innerHTML = '<img src="' + data.secure_url + '" style="width:100%;height:100%;object-fit:cover;border-radius:8px" />'; }
          } else {
            alert('Upload failed: ' + (data.error?.message || 'Unknown error'));
          }
        } catch (err) {
          alert('Upload error: ' + err.message);
          if (btn) btn.textContent = '❌ Error';
          setTimeout(() => { if (btn) btn.textContent = '📤 Upload'; }, 2000);
        } finally {
          if (btn && btn.textContent === '⏳ Uploading...') btn.textContent = origText;
        }
      };
      input.click();
    };

            setLoading(false);
          });
        return unsub;
      }, []);

      const updateStatus = async (id, status) => {
        await fbDb.collection('orders').doc(id).update({ status });
      };

      const formatTime = (ts) => {
        if (!ts) return '';
        return new Date(ts.toMillis()).toLocaleString('en-IN', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
      };

      return (
        <div className="admin-card">
          <h3>📋 Live Orders ({orders.length})</h3>
          {loading ? <p>Loading orders...</p>
            : orders.length === 0 ? <p className="admin-empty">No active orders at the moment.</p>
              : orders.map(o => (
                <div className="admin-order-card" key={o.id}>
                  <div className="admin-order-header">
                    <div>
                      <div className="admin-order-user">👤 {o.userName || 'Customer'}</div>
                      <div className="admin-order-time">{formatTime(o.createdAt)} • #{o.id.slice(-6).toUpperCase()}</div>
                    </div>
                    <span className={`order-status-badge ${o.status}`}>
                      {o.status === 'pending' ? '⏳ Pending' : '🚚 Shipped'}
                    </span>
                  </div>

                  <div className="admin-order-contact">
                    <a href={`tel:${o.userPhone}`} className="admin-contact-btn call">
                      📞 {o.userPhone || 'N/A'}
                    </a>
                    {(o.lat && o.lng) && (
                      <a
                        href={`https://maps.google.com?q=${o.lat},${o.lng}`}
                        target="_blank"
                        rel="noopener noreferrer"
                        className="admin-contact-btn map"
                      >
                        📍 View Map
                      </a>
                    )}
                  </div>

                  {o.address && (
                    <div style={{ fontSize: 12, color: '#888', marginBottom: 10 }}>📍 {o.address}</div>
                  )}

                  <div className="admin-order-items">
                    {(o.items || []).map((item, i) => (
                      <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '4px 0' }}>
                        <img src={item.img || 'https://images.unsplash.com/photo-1633945274405-b6c8069047b0?q=80&w=100'} alt={item.name} style={{ width: 70, height: 70, borderRadius: 6, objectFit: 'cover' }} />
                        <div style={{ flex: 1, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                          <span style={{ fontWeight: 600 }}>{item.name} <span style={{ color: '#888', fontSize: 12 }}>× {item.qty}</span></span>
                          <span style={{ fontWeight: 700 }}>₹{item.price * item.qty}</span>
                        </div>
                      </div>
                    ))}
                  </div>

                  <div className="admin-order-total">
                    Total: ₹{o.total}
                    <span style={{ fontSize: 12, fontWeight: 400, color: '#888', marginLeft: 8 }}>
                      ({o.paymentMethod === 'cod' ? '💵 COD' : '💳 Online'})
                    </span>
                  </div>

                  <div className="admin-order-actions">
                    {o.status === 'pending' && (
                      <button className="admin-order-btn ship" onClick={() => updateStatus(o.id, 'shipped')}>
                        🚚 Mark Shipped
                      </button>
                    )}
                    <button className="admin-order-btn complete" onClick={() => {
                      if (confirm('Mark this order as Completed?')) updateStatus(o.id, 'completed');
                    }}>
                      ✅ Complete
                    </button>
                    <button className="admin-order-btn reject" onClick={() => {
                      if (confirm('Reject this order?')) updateStatus(o.id, 'rejected');
                    }}>
                      ❌ Reject
                    </button>
                  </div>
                </div>
              ))}
        </div>
      );
    }

    /* ─── SCROLL CARDS EDITOR ─── */
    function ScrollCardsEditor() {
      const [cards, setCards] = useState([]);
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [editIdx, setEditIdx] = useState(null);
      const [editForm, setEditForm] = useState({ small: '', title: '', img: '' });

      useEffect(() => {
        fbDb.collection('site').doc('promoCards').get().then(doc => {
          if (doc.exists && doc.data().cards) {
            setCards(doc.data().cards);
          } else {
            setCards(DEFAULT_PROMOS.map(p => ({ ...p })));
          }
          setLoading(false);
        });
      }, []);

      const saveAll = async (newCards) => {
        setSaving(true);
        try {
          await fbDb.collection('site').doc('promoCards').set({ cards: newCards });
          setCards(newCards);
        } catch (e) { alert('Error saving: ' + e.message); }
        setSaving(false);
      };

      const startEdit = (idx) => {
        setEditIdx(idx);
        setEditForm({ ...cards[idx] });
      };

      const startAdd = () => {
        setEditIdx('new');
        setEditForm({ small: '', title: '', img: '' });
      };

      const cancelEdit = () => { setEditIdx(null); setEditForm({ small: '', title: '', img: '' }); };

      const saveEdit = async () => {
        if (!editForm.title.trim()) { alert('Title required'); return; }
        let newCards;
        if (editIdx === 'new') {
          newCards = [...cards, { ...editForm }];
        } else {
          newCards = cards.map((c, i) => i === editIdx ? { ...editForm } : c);
        }
        await saveAll(newCards);
        cancelEdit();
      };

      const deleteCard = async (idx) => {
        if (!confirm('Delete this card?')) return;
        const newCards = cards.filter((_, i) => i !== idx);
        await saveAll(newCards);
      };

      const handleImgUpload = async (btn) => {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'image/*';
        input.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const origText = btn.textContent;
          btn.textContent = '⏳ Uploading...';
          try {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CLOUDINARY_CONFIG.uploadPreset);
            formData.append('folder', CLOUDINARY_CONFIG.uploadFolder);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CONFIG.cloudName}/image/upload`, { method: 'POST', body: formData });
            const data = await res.json();
            if (data.secure_url) {
              setEditForm(prev => ({ ...prev, img: data.secure_url }));
            } else {
              alert('Upload failed: ' + (data.error?.message || 'Unknown error'));
            }
          } catch (err) { alert('Upload error: ' + err.message); }
          btn.textContent = origText;
        };
        input.click();
      };

      if (loading) return <div className="admin-card"><p>Loading...</p></div>;

      return (
        <div className="admin-card">
          <h3>🎠 Scroll Cards ({cards.length})</h3>
          <p style={{ color: '#888', fontSize: 13, marginBottom: 16 }}>Ye cards "Authentic Biryani" scroll section mein dikhti hain (CheckOut se upar wala section).</p>

          {/* Card List */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginBottom: 20 }}>
            {cards.map((card, idx) => (
              <div key={idx} style={{ display: 'flex', alignItems: 'center', gap: 12, background: '#f8f8f8', borderRadius: 10, padding: '10px 14px', border: '1.5px solid #eee' }}>
                {card.img && <img src={card.img} alt={card.title} style={{ width: 64, height: 48, objectFit: 'cover', borderRadius: 6, flexShrink: 0 }} />}
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 11, color: '#888', textTransform: 'uppercase', letterSpacing: '.05em', marginBottom: 2 }}>{card.small}</div>
                  <div style={{ fontWeight: 700, fontSize: 14, color: '#222', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{card.title}</div>
                </div>
                <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>
                  <button onClick={() => startEdit(idx)} style={{ padding: '6px 10px', background: '#e3f2fd', color: '#1565c0', border: 'none', borderRadius: 6, cursor: 'pointer', fontWeight: 600, fontSize: 12 }}>✏️ Edit</button>
                  <button onClick={() => deleteCard(idx)} style={{ padding: '6px 10px', background: '#fbe9e7', color: '#c62828', border: 'none', borderRadius: 6, cursor: 'pointer', fontWeight: 600, fontSize: 12 }}>🗑️</button>
                </div>
              </div>
            ))}
          </div>

          <button onClick={startAdd} style={{ padding: '10px 18px', background: 'linear-gradient(135deg,#ff5722,#e64a19)', color: '#fff', border: 'none', borderRadius: 8, cursor: 'pointer', fontWeight: 700, fontSize: 14, marginBottom: editIdx !== null ? 20 : 0 }}>
            ➕ Add New Card
          </button>

          {/* Edit / Add Form */}
          {editIdx !== null && (
            <div style={{ background: '#fff7f5', border: '2px solid #ff5722', borderRadius: 12, padding: 20, marginTop: 16 }}>
              <h4 style={{ margin: '0 0 14px', color: '#e64a19' }}>{editIdx === 'new' ? '➕ New Card' : `✏️ Edit Card #${editIdx + 1}`}</h4>
              <label style={{ display: 'block', fontWeight: 700, fontSize: 12, color: '#666', textTransform: 'uppercase', marginBottom: 4 }}>Small Text (above title)</label>
              <input type="text" value={editForm.small} onChange={e => setEditForm(p => ({ ...p, small: e.target.value }))} placeholder="e.g. WEEKEND SPECIAL" style={{ width: '100%', padding: '10px 14px', border: '1.5px solid #ddd', borderRadius: 8, fontSize: 14, marginBottom: 12, boxSizing: 'border-box' }} />

              <label style={{ display: 'block', fontWeight: 700, fontSize: 12, color: '#666', textTransform: 'uppercase', marginBottom: 4 }}>Title / Main Text</label>
              <input type="text" value={editForm.title} onChange={e => setEditForm(p => ({ ...p, title: e.target.value }))} placeholder="e.g. Father's Day at Bikkgane" style={{ width: '100%', padding: '10px 14px', border: '1.5px solid #ddd', borderRadius: 8, fontSize: 14, marginBottom: 12, boxSizing: 'border-box' }} />

              <label style={{ display: 'block', fontWeight: 700, fontSize: 12, color: '#666', textTransform: 'uppercase', marginBottom: 4 }}>Background Image</label>
              <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: editForm.img ? 8 : 12 }}>
                <input type="text" value={editForm.img} onChange={e => setEditForm(p => ({ ...p, img: e.target.value }))} placeholder="Image URL" style={{ flex: 1, padding: '10px 14px', border: '1.5px solid #ddd', borderRadius: 8, fontSize: 13 }} />
                <button type="button" onClick={e => handleImgUpload(e.currentTarget)} style={{ padding: '10px 14px', background: '#ff5722', color: '#fff', border: 'none', borderRadius: 8, cursor: 'pointer', fontWeight: 700, fontSize: 13, whiteSpace: 'nowrap', flexShrink: 0 }}>📤 Upload</button>
              </div>
              {editForm.img && <img src={editForm.img} alt="preview" style={{ width: '100%', height: 120, objectFit: 'cover', borderRadius: 8, marginBottom: 12 }} />}

              <div style={{ display: 'flex', gap: 10 }}>
                <button onClick={saveEdit} disabled={saving} style={{ flex: 1, padding: '11px 0', background: 'linear-gradient(135deg,#ff5722,#e64a19)', color: '#fff', border: 'none', borderRadius: 8, cursor: 'pointer', fontWeight: 700, fontSize: 14 }}>{saving ? '⏳ Saving...' : '💾 Save Card'}</button>
                <button onClick={cancelEdit} style={{ padding: '11px 18px', background: '#f5f5f5', color: '#555', border: 'none', borderRadius: 8, cursor: 'pointer', fontWeight: 600, fontSize: 14 }}>Cancel</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ─── CONTENT EDITOR ─── */
    function ContentEditor() {
      const [form, setForm] = useState({
        heroHeading: '', heroSub: '', heroImg: '',
        aboutHeading: '', aboutText: '', aboutImg: '',
        promoHeading: '', promoText: '', promoImg: '',
      });
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);

      useEffect(() => {
        fbDb.collection('site').doc('content').get().then(doc => {
          if (doc.exists) setForm(f => ({ ...f, ...doc.data() }));
          setLoading(false);
        });
      }, []);

      const handleSave = async (section) => {
        setSaving(section);
        const sectionFields = {
          hero: { heroHeading: form.heroHeading, heroSub: form.heroSub, heroImg: form.heroImg },
          about: { aboutHeading: form.aboutHeading, aboutText: form.aboutText, aboutImg: form.aboutImg },
          promo: { promoHeading: form.promoHeading, promoText: form.promoText, promoImg: form.promoImg },
        };
        try {
          await fbDb.collection('site').doc('content').set(sectionFields[section], { merge: true });
          alert('✅ ' + section.charAt(0).toUpperCase() + section.slice(1) + ' section saved!');
        } catch (e) { alert('❌ Error: ' + e.message); }
        setSaving(false);
      };

      const f = (key) => ({ value: form[key] || '', onChange: e => setForm(prev => ({ ...prev, [key]: e.target.value })) });

      const uploadContentImage = async (key, btn) => {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'image/*';
        input.onchange = async (ev) => {
          const file = ev.target.files[0]; if (!file) return;
          const orig = btn.textContent; btn.textContent = '⏳...';
          const fd = new FormData();
          fd.append('file', file); fd.append('upload_preset', CLOUDINARY_CONFIG.uploadPreset); fd.append('folder', CLOUDINARY_CONFIG.uploadFolder);

            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CONFIG.cloudName}/image/upload`, { method: 'POST', body: fd });
            const data = await res.json();
            if (data.secure_url) { setForm(prev => ({ ...prev, [key]: data.secure_url })); btn.textContent = '✅ Done'; }
            else btn.textContent = '❌ Fail';
          } catch (e) { btn.textContent = '❌ Error'; }
          setTimeout(() => { btn.textContent = orig; }, 2000);
        };
        input.click();
      };

      if (loading) return <div className="admin-card"><p>Loading content...</p></div>;

      return (
        <div className="admin-card">
          <h3>📝 Content Editor</h3>
          <p style={{ color: '#888', marginBottom: 20, fontSize: 13 }}>Yahan se website ke sections ka text aur images change karein. Changes instantly live ho jayenge!</p>

          {/* Hero Section */}
          <div style={{ border: '1.5px solid #ff572222', borderRadius: 10, padding: 16, marginBottom: 20 }}>
            <h4 style={{ color: '#ff5722', marginBottom: 12 }}>🏠 Hero Section (Homepage Main Banner)</h4>
            <div className="edit-modal-field">
              <label>Main Heading (HTML allowed, e.g. &lt;em&gt;Free Delivery&lt;/em&gt;)</label>
              <input type="text" {...f('heroHeading')} placeholder="e.g. <em>Free Delivery</em><br/>On Orders Above ₹300" />
            </div>
            <div className="edit-modal-field">
              <label>Subheading / Description</label>
              <textarea {...f('heroSub')} rows={3} placeholder="Hero section ka description..." />
            </div>
            <div className="edit-modal-field">
              <label>Right-Side Image</label>
              <div style={{ display: 'flex', gap: 8 }}>
                <input type="text" {...f('heroImg')} placeholder="Image URL..." style={{ flex: 1 }} />
                <button type="button" className="admin-submit" style={{ padding: '8px 12px', flexShrink: 0 }} onClick={e => uploadContentImage('heroImg', e.currentTarget)}>📤 Upload</button>
              </div>
              {form.heroImg && <img src={form.heroImg} style={{ marginTop: 8, height: 80, borderRadius: 6, objectFit: 'cover' }} />}
            </div>
            <button className="admin-submit" onClick={() => handleSave('hero')} disabled={saving === 'hero'}>{saving === 'hero' ? '⏳ Saving...' : '💾 Save Hero'}</button>
          </div>

          {/* About Section */}
          <div style={{ border: '1.5px solid #2e7d3222', borderRadius: 10, padding: 16, marginBottom: 20 }}>
            <h4 style={{ color: '#2e7d32', marginBottom: 12 }}>ℹ️ About Section (Homepage & About Page)</h4>
            <div className="edit-modal-field">
              <label>Heading</label>
              <input type="text" {...f('aboutHeading')} placeholder="e.g. Authentic Flavors, Royal Heritage" />
            </div>
            <div className="edit-modal-field">
              <label>Description Text</label>
              <textarea {...f('aboutText')} rows={4} placeholder="About section ka description..." />
            </div>
            <div className="edit-modal-field">
              <label>About Image</label>
              <div style={{ display: 'flex', gap: 8 }}>
                <input type="text" {...f('aboutImg')} placeholder="Image URL..." style={{ flex: 1 }} />
                <button type="button" className="admin-submit" style={{ padding: '8px 12px', flexShrink: 0 }} onClick={e => uploadContentImage('aboutImg', e.currentTarget)}>📤 Upload</button>
              </div>
              {form.aboutImg && <img src={form.aboutImg} style={{ marginTop: 8, height: 80, borderRadius: 6, objectFit: 'cover' }} />}
            </div>
            <button className="admin-submit" onClick={() => handleSave('about')} disabled={saving === 'about'}>{saving === 'about' ? '⏳ Saving...' : '💾 Save About'}</button>

          <div style={{ border: '1.5px solid #f0a82422', borderRadius: 10, padding: 16 }}>

              <label>Description Text</label>

            <button className="admin-submit" onClick={() => handleSave('promo')} disabled={saving === 'promo'}>{saving === 'promo' ? '⏳ Saving...' : '💾 Save Promo'}</button>
          </div>
        </div>
      );
    }

    /* ─── CATEGORIES MANAGER ─── */
    function CategoriesManager() {
      const [categories, setCategories] = useState([]);
      const [newCatName, setNewCatName] = useState('');
      const [editingId, setEditingId] = useState(null);
      const [editName, setEditName] = useState('');
      const [saving, setSaving] = useState(false);
      const [category, setCategory] = useState('');
      const [products, setProducts] = useState([]);

      useEffect(() => {
        const unsub = fbDb.collection('categories').orderBy('createdAt', 'desc').onSnapshot(snap => {
          const items = [];
          snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
          setCategories(items);
        });
        return unsub;
      }, []);

      useEffect(() => {
        const unsub = fbDb.collection('products').onSnapshot(snap => {
          const items = [];
          snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
          setProducts(items);
        });
        return unsub;
      }, []);

      const handleAdd = async () => {
        if (!newCatName.trim()) return;
        setSaving(true);
        try {
          await fbDb.collection('categories').add({
            name: newCatName.trim(),
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          setNewCatName('');
        } catch (err) {
          console.error('Error adding category:', err);
        }
        setSaving(false);
      };

      const handleDelete = async (id) => {
        if (!confirm('Delete this category?')) return;
        try {
          await fbDb.collection('categories').doc(id).delete();
        } catch (err) {
          console.error('Error deleting category:', err);
        }
      };

      const handleEdit = (cat) => {
        setEditingId(cat.id);
        setEditName(cat.name);
      };

      const handleSave = async (id) => {
        if (!editName.trim()) return;
        setSaving(true);
        try {
          await fbDb.collection('categories').doc(id).update({ name: editName.trim() });
          setEditingId(null);
          setEditName('');
        } catch (err) {
          console.error('Error updating category:', err);
        }
        setSaving(false);
      };

      const getProductCount = (catName) => {
        return products.filter(p => p.category === catName).length;
      };

      return (
        <div className="admin-card">
          <h3>📂 Manage Categories</h3>
          <div className="admin-form" style={{ marginBottom: 24 }}>
            <label>Category Name</label>
            <div style={{ display: 'flex', gap: 10 }}>
              <input
                type="text"
                placeholder="e.g. Hyderabadi Biryani"
                value={newCatName}
                onChange={e => setNewCatName(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && handleAdd()}
                style={{ flex: 1 }}
              />
              <button className="admin-submit" onClick={handleAdd} disabled={saving} style={{ alignSelf: 'flex-start' }}>
                {saving ? 'Saving...' : '+ Add'}
              </button>
            </div>
          </div>
          {categories.length === 0 ? (
            <div className="admin-empty">No categories added yet. Add your first category above.</div>
          ) : (
            <table className="admin-table">
              <thead>
                <tr>
                  <th>Category Name</th>
                  <th>Products</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                {categories.map(cat => (
                  <tr key={cat.id}>
                    <td>
                      {editingId === cat.id ? (
                        <input
                          type="text"
                          value={editName}
                          onChange={e => setEditName(e.target.value)}
                          onKeyDown={e => e.key === 'Enter' && handleSave(cat.id)}
                          style={{ padding: '6px 10px', border: '1px solid #ddd', borderRadius: 6, fontSize: 13, width: '100%' }}
                        />
                      ) : (
                        <span style={{ fontWeight: 600 }}>{cat.name}</span>
                      )}
                    </td>
                    <td>
                      <span className="admin-status-badge online">{getProductCount(cat.name)} items</span>
                    </td>
                    <td>
                      {editingId === cat.id ? (
                        <button className="admin-submit" onClick={() => handleSave(cat.id)} disabled={saving} style={{ padding: '6px 14px', fontSize: 12, marginRight: 8 }}>
                          Save
                        </button>
                      ) : (
                        <button className="admin-toggle-btn" onClick={() => handleEdit(cat)} style={{ marginRight: 8 }}>
                          ✏️ Edit
                        </button>
                      )}
                      <button
                        onClick={() => handleDelete(cat.id)}
                        style={{ background: '#c62828', color: '#fff', border: 'none', padding: '6px 14px', borderRadius: 30, fontSize: 12, fontWeight: 700, cursor: 'pointer' }}
                      >
                        🗑️ Delete
                      </button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      );
    }

    function AdminPage({ user, userRole, onClose }) {
      const allowedSections = userRole === 'delivery'
        ? ADMIN_SECTIONS.filter(s => s.key === 'orders')
        : ADMIN_SECTIONS;
      const [activeSection, setActiveSection] = useState(userRole === 'delivery' ? 'orders' : 'add-product');
      const [users, setUsers] = useState([]);
      const [searchUser, setSearchUser] = useState('');
      const [loadingUsers, setLoadingUsers] = useState(false);
      const [saving, setSaving] = useState(false);
      const [categories, setCategories] = useState([]);

      useEffect(() => {
        const unsub = fbDb.collection('categories').orderBy('name').onSnapshot(snap => {
          const cats = [];
          snap.forEach(doc => cats.push({ id: doc.id, ...doc.data() }));
          setCategories(cats);
        });
        return unsub;
      }, []);

      useEffect(() => {
        if (activeSection === 'users') {
          setLoadingUsers(true);
          fbDb.collection('users').get().then(snapshot => {
            const list = [];
            snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
            setUsers(list);
            setLoadingUsers(false);
          }).catch(err => {
            console.error('Error loading users:', err);
            setLoadingUsers(false);
          });
        }
      }, [activeSection]);

      const renderSection = () => {
        switch (activeSection) {
          case 'add-product':
            return (<div className="admin-card"><h3>➕ Add Product</h3><form className="admin-form" onSubmit={e => { e.preventDefault(); if (saving) return; const f = e.target; const name = f.prodName.value.trim(); const price = parseFloat(f.prodPrice.value); const salePrice = parseFloat(f.prodSale.value) || price; const veg = f.prodVeg.checked; const desc = f.prodDesc.value.trim(); const deliveryTime = f.prodDelivery.value.trim() || '30-35 min'; const imgUrl = f.prodImg.value.trim(); if (!name) { alert('Please enter a product name.'); return; } if (!price || isNaN(price) || price <= 0) { alert('Please enter a valid price.'); return; } setSaving(true); fbDb.collection('products').add({ name, price, salePrice, veg, chefRecommended: f.prodChef.checked, checkoutNow: f.prodCheckout.checked, category: f.prodCategory ? f.prodCategory.value : '', inStock: f.prodInStock ? f.prodInStock.checked : true, desc, deliveryTime, imgs: imgUrl ? [imgUrl] : ['https://images.unsplash.com/photo-1633945274405-b6c8069047b0?q=80&w=600&auto=format&fit=crop'], createdAt: firebase.firestore.FieldValue.serverTimestamp() }).then(() => { alert('✅ Product added successfully!'); f.reset(); document.getElementById('prodImgPreview').style.display = 'none'; setSaving(false); }).catch(err => { alert('❌ Error: ' + err.message); setSaving(false); }); }}><label>Product Name</label><input type="text" name="prodName" placeholder="e.g. Chicken Dum Biryani" required /><label>Price (₹)</label><input type="number" name="prodPrice" placeholder="299" required /><label>Sale Price (₹)</label><input type="number" name="prodSale" placeholder="249" /><label style={{ fontSize: 12, fontWeight: 700, color: '#666', textTransform: 'uppercase', letterSpacing: '.04em' }}>Category</label><select name="prodCategory" style={{ padding: '10px 14px', border: '1.5px solid #ddd', borderRadius: 8, fontSize: 14, fontFamily: 'Manrope, sans-serif', width: '100%', background: '#fff', outline: 'none' }}><option value="">Select Category</option>{categories && categories.map(cat => (<option key={cat.id} value={cat.name}>{cat.name}</option>))}</select><div style={{ display: 'flex', gap: 12, alignItems: 'center' }}><label style={{ fontSize: 12, fontWeight: 700, color: '#666', textTransform: 'uppercase' }}>Stock Status</label><label style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer' }}><input type="checkbox" name="prodInStock" defaultChecked style={{ width: 18, height: 18, accentColor: '#2e7d32' }} /> <span style={{ fontSize: 13, fontWeight: 600, color: '#2e7d32' }}>In Stock</span></label></div>
              <div style={{ display: 'flex', gap: 12 }}><label style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 6 }}><input type="checkbox" name="prodVeg" defaultChecked style={{ width: 18, height: 18, accentColor: '#2e7d32' }} /> <span style={{ fontSize: 13, fontWeight: 600, color: '#2e7d32' }}>Veg</span></label><label style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 6 }}><input type="checkbox" name="prodChef" style={{ width: 18, height: 18, accentColor: '#a8290f' }} /> <span style={{ fontSize: 13, fontWeight: 600, color: '#a8290f' }}>Chef Recommended</span></label><label style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 6 }}><input type="checkbox" name="prodCheckout" style={{ width: 18, height: 18, accentColor: '#f0a824' }} /> <span style={{ fontSize: 13, fontWeight: 600, color: '#f0a824' }}>Checkout Now</span></label></div><label>Description</label><textarea name="prodDesc" placeholder="Product description..." rows={3}></textarea><label>Delivery Time</label><input type="text" name="prodDelivery" placeholder="30-35 min" /><label>Product Image</label><div style={{ display: 'flex', gap: 8, alignItems: 'center' }}><input type="text" name="prodImg" id="prodImgUrl" placeholder="Image URL will appear here..." style={{ flex: 1 }} readOnly /><button type="button" className="admin-submit" style={{ padding: '10px 16px', flexShrink: 0 }} onClick={(e) => uploadImage(e.currentTarget)}>📤 Upload</button></div><div id="prodImgPreview" style={{ marginTop: 6, width: 80, height: 80, borderRadius: 8, overflow: 'hidden', background: '#f0f0f0', display: 'none' }}></div><button className="admin-submit" style={{ marginTop: 4 }} disabled={saving}>{saving ? '⏳ Saving...' : 'Add Product'}</button></form></div>);
          case 'manage-products':
            return <ManageProducts categories={categories} />;
          case 'categories':
            return <CategoriesManager />;
          case 'orders':
            return (
              <AdminOrdersSection />
            );
          case 'users':
            return (
              <div className="admin-card">
                <h3>👥 Manage Users ({users.length})</h3>
                <input type="text" placeholder="Search by name, email or phone..." value={searchUser} onChange={e => setSearchUser(e.target.value)} style={{ width: '100%', padding: '10px 14px', borderRadius: 8, border: '1.5px solid #ddd', marginBottom: 16, fontSize: 14 }} />
                {loadingUsers ? <p>Loading users...</p> : users.length === 0 ? <p className="admin-empty">No users found.</p> : (
                  <div style={{ overflowX: 'auto' }}>
                    <table className="admin-table">
                      <thead><tr><th>Name / Email</th><th>Phone</th><th>Role</th><th>Actions</th></tr></thead>
                      <tbody>
                        {users.filter(u => {
                          const s = searchUser.toLowerCase();
                          return (u.fullName || u.name || '').toLowerCase().includes(s) || (u.email || '').toLowerCase().includes(s) || (u.phone || '').toLowerCase().includes(s);
                        }).map(u => (
                          <tr key={u.id}>
                            <td><div><strong>{u.fullName || u.name || 'User'}</strong></div><div style={{ fontSize: 12, color: '#666' }}>{u.email}</div></td>
                            <td>{u.phone}</td>
                            <td><span style={{ padding: '4px 8px', borderRadius: 4, fontSize: 12, fontWeight: 600, background: u.role === 'admin' ? '#e3f2fd' : u.role === 'delivery' ? '#e8f5e9' : '#f5f5f5', color: u.role === 'admin' ? '#1565c0' : u.role === 'delivery' ? '#2e7d32' : '#666' }}>{(u.role || 'user').toUpperCase()}</span></td>
                            <td>
                              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                                {u.role !== 'admin' && <button onClick={async () => { await fbDb.collection('users').doc(u.id).update({ role: 'admin' }); setUsers(users.map(x => x.id === u.id ? { ...x, role: 'admin' } : x)); }} style={{ padding: '6px 10px', background: '#e3f2fd', color: '#1565c0', border: 'none', borderRadius: 4, cursor: 'pointer', fontSize: 12, fontWeight: 600 }}>Make Admin</button>}
                                {u.role !== 'delivery' && <button onClick={async () => { await fbDb.collection('users').doc(u.id).update({ role: 'delivery' }); setUsers(users.map(x => x.id === u.id ? { ...x, role: 'delivery' } : x)); }} style={{ padding: '6px 10px', background: '#e8f5e9', color: '#2e7d32', border: 'none', borderRadius: 4, cursor: 'pointer', fontSize: 12, fontWeight: 600 }}>Make Delivery</button>}
                                {u.role && <button onClick={async () => { await fbDb.collection('users').doc(u.id).update({ role: firebase.firestore.FieldValue.delete() }); setUsers(users.map(x => x.id === u.id ? { ...x, role: null } : x)); }} style={{ padding: '6px 10px', background: '#fff3e0', color: '#e65100', border: 'none', borderRadius: 4, cursor: 'pointer', fontSize: 12, fontWeight: 600 }}>Remove Role</button>}
                              </div>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            );
          case 'scroll-cards':
            return <ScrollCardsEditor />;
          case 'content':
            return <ContentEditor />;
          default:
            return (<div className="admin-card"><h3>📊 Add Product</h3><p style={{ color: '#666', lineHeight: 1.8 }}>Use the sidebar to add new products to your menu.<br />Fill in the details and upload an image via Cloudinary.</p></div>);
        }
      };

      const [sidebarOpen, setSidebarOpen] = useState(false);

      return (
        <div className="admin-page">
          <div className={`admin-sidebar ${sidebarOpen ? 'open' : ''}`}>
            <div className="admin-sidebar-header">Bikkgane <span>Admin</span></div>
            {allowedSections.map(s => (
              <div key={s.key} className={`admin-sidebar-item ${activeSection === s.key ? 'active' : ''}`} onClick={() => { setActiveSection(s.key); setSidebarOpen(false); }}>
                <span className="icon">{s.icon}</span>
                <span>{s.label}</span>
              </div>
            ))}
          </div>
          <div className="admin-overlay" onClick={() => setSidebarOpen(false)}></div>
          <div className="admin-main">
            <div className="admin-header-bar">
              <div style={{ display: 'flex', alignItems: 'center' }}>
                <button className="admin-sidebar-toggle" onClick={() => setSidebarOpen(true)}>➔</button>
                <h2>{allowedSections.find(s => s.key === activeSection)?.label || 'Admin'}</h2>
              </div>
              <button className="admin-back-btn" onClick={onClose}>← Back</button>
            </div>
            {renderSection()}
          </div>
        </div>
      );
    }
    /* ─── APP ─── */
    function App() {
      const [page, setPage] = useState('home');
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [showAuth, setShowAuth] = useState(true);
      const [authMode, setAuthMode] = useState('login');
      const [siteContent, setSiteContent] = useState({});
      const [userRole, setUserRole] = useState(null);

      useEffect(() => {
        const unsub = fbAuth.onAuthStateChanged(async u => {
          if (u) {
            try {
              const doc = await fbDb.collection('users').doc(u.uid).get();
              if (doc.exists && doc.data().phone) {
                setUser(u);
                setShowAuth(false);
                if (doc.data().role) setUserRole(doc.data().role);
                else setUserRole(u.email === ADMIN_EMAIL ? 'admin' : 'user');
              } else {
                setUser(null);
                setUserRole(null);
              }
            } catch (e) {
              setUser(u);
              setShowAuth(false);
              setUserRole(u.email === ADMIN_EMAIL ? 'admin' : 'user');
            }
          } else {
            setUser(null);
            setUserRole(null);
          }
          setAuthLoading(false);
        });
        return unsub;
      }, []);

      useEffect(() => {
        const unsub = fbDb.collection('site').doc('content').onSnapshot(doc => {
          if (doc.exists) setSiteContent(doc.data());
        });
        return unsub;
      }, []);

      const goTo = (key) => {
        setPage(key);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      useEffect(() => {
        const handler = (e) => goTo(e.detail);
        document.addEventListener('navigate', handler);
        return () => document.removeEventListener('navigate', handler);
      }, [page]);

      const handleLoginRequired = () => {
        setAuthMode('guard');
        setShowAuth(true);
      };

      const handleAuthSuccess = (u) => {
        setUser(u);
        setShowAuth(false);
        fbDb.collection('users').doc(u.uid).get().then(doc => {
          if (doc.exists && doc.data().role) setUserRole(doc.data().role);
          else setUserRole(u.email === ADMIN_EMAIL ? 'admin' : 'user');
        }).catch(() => setUserRole(u.email === ADMIN_EMAIL ? 'admin' : 'user'));
      };

      if (authLoading) return null;

      return (
        <React.Fragment>
          <Nav page={page} onNav={goTo} user={user} onLoginClick={() => { setAuthMode('login'); setShowAuth(true); }} userRole={userRole} />
          {page === 'home' && (
            <React.Fragment>
              <Hero onOrderClick={() => goTo('order')} content={siteContent} />
              <ChefRecommended user={user} onLoginRequired={handleLoginRequired} />
              <About content={siteContent} />
              <PromoStrip content={siteContent} />
              <CheckOut user={user} onLoginRequired={handleLoginRequired} />
              <CtaBand />
            </React.Fragment>
          )}
          {page === 'about' && <AboutPage content={siteContent} />}
          {page === 'gallery' && <GalleryPage />}
          {page === 'order' && <MenuPage user={user} onLoginRequired={handleLoginRequired} />}
          {page === 'admin' && <AdminPage user={user} userRole={userRole} onClose={() => goTo('home')} />}
          <Footer />
          <BackTop />
          {showAuth && (
            <AuthPopup
              mode={authMode}
              onClose={() => setShowAuth(false)}
              onSuccess={handleAuthSuccess}
            />
          )}
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
